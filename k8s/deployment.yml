apiVersion: apps/v1
kind: Deployment

metadata:
  name: nextjs-portfolio

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nextjs-portfolio

  template:
    metadata:
      labels:
        app: nextjs-portfolio

    spec:
      containers:
        - name: nextjs-portfolio
          image: prabeshbuilds/portfolio:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 3000