apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-portfolio
  template:
    metadata:
      labels:
        app: nextjs-portfolio
    spec:
      containers:
        - name: nextjs-portfolio
          image: prabeshdevops/nextjs-portfolio:v5
          ports:
            - containerPort: 3000